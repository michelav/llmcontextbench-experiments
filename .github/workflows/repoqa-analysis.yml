name: RepoQA artifact analysis

on:
  push:
    paths:
      - "experiments/repoqa/**"
      - "experiments/tool-paper/build_table3.py"
      - "expected/table-3b-repoqa.csv"
      - "requirements-analysis.txt"
      - "justfile"
      - ".github/workflows/repoqa-analysis.yml"
  pull_request:
    paths:
      - "experiments/repoqa/**"
      - "experiments/tool-paper/build_table3.py"
      - "expected/table-3b-repoqa.csv"
      - "requirements-analysis.txt"
      - "justfile"
      - ".github/workflows/repoqa-analysis.yml"

jobs:
  offline-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements-analysis.txt

      - name: Check analysis syntax
        run: |
          python -m py_compile \
            experiments/repoqa/analyze_repoqa.py \
            experiments/repoqa/derive_repoqa.py \
            experiments/repoqa/build_table_3b.py \
            experiments/repoqa/generate_figures.py \
            experiments/tool-paper/build_table3.py

      - name: Analyze complete RepoQA baseline
        run: |
          python experiments/repoqa/derive_repoqa.py \
            experiments/repoqa/baseline-01 \
            --output-dir experiments/repoqa/baseline-01/derived/analysis

      - name: Check Table 3(b) selection contract
        run: |
          cp experiments/repoqa/paper-selection.example.json /tmp/repoqa-selection.json
          if python experiments/repoqa/build_table_3b.py \
              experiments/repoqa/baseline-01/derived/analysis \
              --selection /tmp/repoqa-selection.json; then
            echo "The empty example selection should not generate Table 3(b)." >&2
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: repoqa-analysis
          path: experiments/repoqa/baseline-01/derived/analysis/
