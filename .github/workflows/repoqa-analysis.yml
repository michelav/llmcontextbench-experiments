name: RepoQA artifact analysis

on:
  push:
    paths:
      - "experiments/repoqa/**"
      - "experiments/tool-paper/**"
      - "requirements-analysis.txt"
      - "Makefile"
      - ".github/workflows/repoqa-analysis.yml"
  pull_request:
    paths:
      - "experiments/repoqa/**"
      - "experiments/tool-paper/**"
      - "requirements-analysis.txt"
      - "Makefile"

jobs:
  offline-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements-analysis.txt
      - name: Check Python syntax
        run: |
          python -m py_compile \
            experiments/repoqa/analyze_repoqa.py \
            experiments/repoqa/generate_figures.py \
            experiments/tool-paper/build_table3.py \
            experiments/tool-paper/generate_figures.py
      - name: Analyze complete RepoQA baseline
        run: make repoqa-analysis
      - name: Generate RepoQA figures
        run: make repoqa-figures
      - name: Generate conceptual tool-paper figures
        run: make tool-paper-figures
      - name: Build combined tool-paper table
        run: make tool-paper-table
      - uses: actions/upload-artifact@v4
        with:
          name: repoqa-tool-paper-artifacts
          path: |
            experiments/repoqa/baseline-01/derived/
            experiments/tool-paper/generated/
